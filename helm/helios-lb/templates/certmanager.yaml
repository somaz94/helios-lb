{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.webhook.certManager.issuerName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helios-lb.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "helios-lb.fullname" . }}-serving-cert
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helios-lb.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "helios-lb.fullname" . }}-webhook-service.{{ .Values.namespace }}.svc
  - {{ include "helios-lb.fullname" . }}-webhook-service.{{ .Values.namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ .Values.webhook.certManager.issuerName }}
  secretName: {{ include "helios-lb.fullname" . }}-webhook-server-cert
{{- end }}
