{{- if and .Values.crds.create .Values.crds.remove }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helios-lb.fullname" . }}-crd-cleanup
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "helios-lb.fullname" . }}-crd-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helios-lb.fullname" . }}-crd-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "helios-lb.fullname" . }}-crd-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "helios-lb.fullname" . }}-crd-cleanup
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "helios-lb.fullname" . }}-crd-cleanup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helios-lb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
spec:
  template:
    metadata:
      name: {{ include "helios-lb.fullname" . }}-crd-cleanup
    spec:
      serviceAccountName: {{ include "helios-lb.fullname" . }}-crd-cleanup
      containers:
      - name: kubectl
        image: "{{ .Values.crds.cleanup.image.repository }}:{{ .Values.crds.cleanup.image.tag }}"
        command:
        - /bin/sh
        - -c
        - |
          kubectl delete crd heliosconfigs.balancer.helios.dev --ignore-not-found
      restartPolicy: Never
  backoffLimit: 1
{{- end }}
