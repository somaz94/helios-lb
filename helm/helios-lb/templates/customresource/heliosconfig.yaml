{{- if .Values.customresource.basic.enabled }}
apiVersion: balancer.helios.dev/v1
kind: HeliosConfig
metadata:
  name: {{ .Values.customresource.basic.name | default "heliosconfig-basic" }}
spec:
  ipRange: {{ .Values.customresource.basic.ipRange }}
  {{- if .Values.customresource.basic.ipv6Range }}
  ipv6Range: {{ .Values.customresource.basic.ipv6Range }}
  {{- end }}
  {{- if .Values.customresource.basic.method }}
  method: {{ .Values.customresource.basic.method }}
  {{- end }}
  {{- if .Values.customresource.basic.ports }}
  ports:
    {{- toYaml .Values.customresource.basic.ports | nindent 4 }}
  {{- end }}
  {{- if .Values.customresource.basic.weights }}
  weights:
    {{- toYaml .Values.customresource.basic.weights | nindent 4 }}
  {{- end }}
  {{- if .Values.customresource.basic.namespaceSelector }}
  namespaceSelector:
    {{- toYaml .Values.customresource.basic.namespaceSelector | nindent 4 }}
  {{- end }}
  {{- if .Values.customresource.basic.maxAllocations }}
  maxAllocations: {{ .Values.customresource.basic.maxAllocations }}
  {{- end }}
{{- end }}

{{- if .Values.customresource.port.enabled }}
apiVersion: balancer.helios.dev/v1
kind: HeliosConfig
metadata:
  name: {{ .Values.customresource.port.name | default "heliosconfig-port" }}
spec:
  ipRange: {{ .Values.customresource.port.ipRange }}
  {{- if .Values.customresource.port.ipv6Range }}
  ipv6Range: {{ .Values.customresource.port.ipv6Range }}
  {{- end }}
  {{- if .Values.customresource.port.method }}
  method: {{ .Values.customresource.port.method }}
  {{- end }}
  ports:
    {{- toYaml .Values.customresource.port.ports | nindent 4 }}
  {{- if .Values.customresource.port.namespaceSelector }}
  namespaceSelector:
    {{- toYaml .Values.customresource.port.namespaceSelector | nindent 4 }}
  {{- end }}
  {{- if .Values.customresource.port.maxAllocations }}
  maxAllocations: {{ .Values.customresource.port.maxAllocations }}
  {{- end }}
{{- end }}

{{- if .Values.customresource.weight.enabled }}
apiVersion: balancer.helios.dev/v1
kind: HeliosConfig
metadata:
  name: {{ .Values.customresource.weight.name | default "heliosconfig-weight" }}
spec:
  ipRange: {{ .Values.customresource.weight.ipRange }}
  {{- if .Values.customresource.weight.ipv6Range }}
  ipv6Range: {{ .Values.customresource.weight.ipv6Range }}
  {{- end }}
  method: WeightedRoundRobin
  {{- if .Values.customresource.weight.ports }}
  ports:
    {{- toYaml .Values.customresource.weight.ports | nindent 4 }}
  {{- end }}
  weights:
    {{- toYaml .Values.customresource.weight.weights | nindent 4 }}
  {{- if .Values.customresource.weight.namespaceSelector }}
  namespaceSelector:
    {{- toYaml .Values.customresource.weight.namespaceSelector | nindent 4 }}
  {{- end }}
  {{- if .Values.customresource.weight.maxAllocations }}
  maxAllocations: {{ .Values.customresource.weight.maxAllocations }}
  {{- end }}
{{- end }}
