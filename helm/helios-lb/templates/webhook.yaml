{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helios-lb.fullname" . }}-webhook-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helios-lb.labels" . | nindent 4 }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: controller-manager
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "helios-lb.fullname" . }}-validating-webhook
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/{{ include "helios-lb.fullname" . }}-serving-cert
  {{- end }}
  labels:
    {{- include "helios-lb.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "helios-lb.fullname" . }}-webhook-service
      namespace: {{ .Values.namespace }}
      path: /validate-balancer-helios-dev-v1-heliosconfig
  failurePolicy: Fail
  name: vheliosconfig.kb.io
  rules:
  - apiGroups:
    - balancer.helios.dev
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - heliosconfigs
  sideEffects: None
{{- end }}
