# Default values for helios-lb.
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Namespace where the controller will be installed
namespace: helios-lb-system

image:
  repository: somaz940/helios-lb
  pullPolicy: IfNotPresent
  tag: "v0.5.0"

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "helios-lb-controller-manager"
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Controller configuration
controller:
  metrics:
    bindAddress: ":8443"
  health:
    bindAddress: ":9082"
  leaderElection:
    enabled: true

service:
  type: ClusterIP
  port: 8443

# Probe configuration
probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    port: 9082
    path: /healthz
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    port: 9082
    path: /readyz

rbac:
  create: true

# CRD installation
crds:
  create: true
  remove: true
  cleanup:
    image:
      repository: bitnami/kubectl
      tag: "1.32.0"

# Metrics configuration
metrics:
  enabled: true
  service:
    port: 8443
    annotations: {}

# Webhook configuration (requires cert-manager)
webhook:
  enabled: false
  # cert-manager issuer configuration
  certManager:
    # If true, cert-manager Issuer and Certificate resources are created
    enabled: false
    issuerName: "helios-lb-selfsigned-issuer"

nodeSelector: {}
tolerations: []
affinity: {}

customresource:
  basic:
    enabled: false
    name: "heliosconfig-basic"
    ipRange: "10.10.10.65"
    # ipv6Range: "fd00::1"  # Optional: enables dual-stack (IPv4 + IPv6)
    method: "RoundRobin"
    # namespaceSelector: []  # Optional: restrict to specific namespaces
    # maxAllocations: 0      # Optional: limit IP allocations (0 = unlimited)

  port:
    enabled: false
    name: "heliosconfig-port"
    ipRange: "10.10.10.65"
    # ipv6Range: "fd00::1"  # Optional: enables dual-stack (IPv4 + IPv6)
    method: "RoundRobin"
    ports:
      - port: 80
      - port: 443
    # namespaceSelector: []  # Optional: restrict to specific namespaces
    # maxAllocations: 0      # Optional: limit IP allocations (0 = unlimited)

  weight:
    enabled: false
    name: "heliosconfig-weight"
    ipRange: "10.10.10.65"
    # ipv6Range: "fd00::1"  # Optional: enables dual-stack (IPv4 + IPv6)
    ports:
      - port: 80
      - port: 443
    weights:
      - serviceName: "service1"
        weight: 3
      - serviceName: "service2"
        weight: 2
      - serviceName: "service3"
        weight: 1
    # namespaceSelector: []  # Optional: restrict to specific namespaces
    # maxAllocations: 0      # Optional: limit IP allocations (0 = unlimited)