---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-balancer-helios-dev-v1-heliosconfig
  failurePolicy: Fail
  name: vheliosconfig.kb.io
  rules:
  - apiGroups:
    - balancer.helios.dev
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - heliosconfigs
  sideEffects: None
