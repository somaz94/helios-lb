apiVersion: balancer.helios.dev/v1
kind: HeliosConfig
metadata:
  name: heliosconfig-sample
spec:
  # IP range for virtual IP allocation (single IP or range format)
  # IMPORTANT: Replace with an unused IP in your network before applying
  # Use 'make find-free-ip' to scan for available IPs
  ipRange: "<YOUR_FREE_IP>" # e.g. 192.168.1.100 or 192.168.1.100-192.168.1.200
  method: RoundRobin  # Optional: Load balancing method (defaults to RoundRobin) Enable Value: RoundRobin, LeastConnection