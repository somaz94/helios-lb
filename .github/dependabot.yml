version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-minor:
        update-types:
          - minor
          - patch
    # Pin k8s.io/* to the minor that controller-runtime supports.
    # Newer client-go adds methods to ResourceEventHandlerRegistration that
    # controller-runtime's handlerRegistration does not yet implement, breaking
    # the build (see PR #50). Drop these ignores once controller-runtime
    # publishes a release that tracks the next k8s minor.
    ignore:
      - dependency-name: "k8s.io/api"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "k8s.io/apimachinery"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "k8s.io/client-go"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]


